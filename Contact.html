<!DOCTYPE html>
<html>
<head>
  <title>Contact - Walinase Africa Hub</title>

  <style>

    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:linear-gradient(to right, black, #003366, #006633);
      color:white;
    }

    header{
      text-align:center;
      padding:50px;
      background:black;
    }

    header h1{
      color:#00ff99;
      font-size:45px;
    }

    .contact-container{
      width:90%;
      max-width:500px;
      margin:40px auto;
      background:rgba(255,255,255,0.1);
      padding:30px;
      border-radius:15px;
      box-shadow:0 0 15px rgba(0,0,0,0.5);
    }

    input, textarea{
      width:100%;
      padding:12px;
      margin-top:10px;
      margin-bottom:20px;
      border:none;
      border-radius:8px;
      font-size:16px;
    }

    button{
      background:#00cc66;
      color:white;
      border:none;
      padding:12px 25px;
      border-radius:8px;
      font-size:16px;
      cursor:pointer;
      width:100%;
    }

    button:hover{
      background:#00994d;
    }

    .info{
      text-align:center;
      margin-top:30px;
    }

    .info p{
      margin:8px;
    }

    footer{
      text-align:center;
      padding:20px;
      background:black;
      margin-top:40px;
    }

    .home-link{
      color:#00ffcc;
      text-decoration:none;
      font-weight:bold;
    }

  </style>

</head>

<body>

<header>
  <h1>📞 Contact Us</h1>
  <p>Reach Walinase Africa Hub</p>
</header>

<section class="contact-container">

  <form>

    <input type="text" placeholder="Your Name">

    <input type="email" placeholder="Your Email">

    <textarea rows="5" placeholder="Your Message"></textarea>

    <button type="submit">Send Message</button>

  </form>

  <div class="info">

    <p>📧 walinaseafricahub@gmail.com</p>

    <p>📱 +260 XXX XXX XXX</p>

    <p>🌍 Zambia, Africa</p>

  </div>

</section>

<footer>

  <p>© 2026 Walinase Africa Hub</p>

  <a href="index.html" class="home-link">
    ⬅ Back Home
  </a>

</footer>

</body>
</html>
