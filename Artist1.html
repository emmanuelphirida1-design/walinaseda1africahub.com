<!DOCTYPE html>

<style>

body{

}

header{

  padding:50px;
  background:black;

}

audio{

  margin-top:15px;
}

.download-btn{
  display:inline-block;
  margin-top:15px;
  background:#00cc66;
  color:white;
  text-decoration:none;
  padding:12px 20px;
  border-radius:8px;
  font-weight:bold;
}

.download-btn:hover{
  background:#00994d;
}

.socials{
  text-align:center;
  margin-top:30px;
}

.socials a{
  color:#00ffcc;
  margin:10px;
  text-decoration:none;
  font-weight:bold;

footer{

  padding:20px;
